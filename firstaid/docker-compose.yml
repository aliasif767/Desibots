version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: firstaid_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: firstaid_backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - MONGODB_DB=firstaid_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=llama3-70b-8192
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./backend:/app

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: firstaid_streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
